<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearningSpot | Education Menu</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevents double scrollbars */
            background-color: #0f172a;
            font-family: system-ui, sans-serif;
        }

        /* Header bar for the menu */
        .nav-bar {
            height: 60px;
            background: #1e293b;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
        }

        .back-btn {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid #334155;
            padding: 5px 15px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #334155;
            color: white;
        }

        .title {
            color: white;
            margin-left: 20px;
            font-weight: 600;
        }

        /* The Iframe Container */
        .content-area {
            position: absolute;
            top: 60px;
            bottom: 0;
            left: 0;
            right: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="https://learningspot.vercel.app" class="back-btn">← Back to Home</a>
        <div class="title">Education Portal</div>
    </div>

    <div class="content-area">
        <iframe 
            src="https://now.gg/apps/a/19900/b.html" 
            sandbox="allow-scripts allow-same-origin allow-forms"
            allow="autoplay; fullscreen; cursor-lock"
            title="Education Content">
        </iframe>
    </div>

</body>
</html>
