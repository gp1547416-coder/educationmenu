<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearningSpot | Education Hub</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0f172a; font-family: sans-serif; }
        
        .header {
            height: 50px;
            background: #1e293b;
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: white;
            border-bottom: 1px solid #334155;
        }

        .container { width: 100%; height: calc(100vh - 50px); position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Device Not Supported Overlay */
        #error-overlay {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98); /* LearningSpot Dark Theme */
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .error-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #ef4444; /* Red border for error */
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .error-card h1 { color: #ef4444; margin-top: 0; }
        .error-card p { color: #94a3b8; line-height: 1.6; }
        .logo-text { font-weight: bold; color: #4f46e5; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <div id="error-overlay">
        <div class="error-card">
            <span class="logo-text">LearningSpot / EducationMenu</span>
            <h1>Device Not Supported</h1>
            <p><b>Roblox.html Network Traffic was detected.</b></p>
            <p>Your current hardware configuration or network environment is not supported for this module.</p>
        </div>
    </div>

    <div class="header">
        <span style="font-weight: bold;">LearningSpot Portal</span>
    </div>

    <div class="container">
        <iframe 
            id="edu-frame"
            src="https://www.easyfun.gg/cloud-games/roblox.html" 
            allow="autoplay; fullscreen; cursor-lock"
        ></iframe>
    </div>

    <script>
        const frame = document.getElementById('edu-frame');
        const overlay = document.getElementById('error-overlay');

        // Detection Logic
        function triggerError() {
            overlay.style.display = 'flex';
            frame.remove(); // Remove the broken frame entirely
        }

        // 1. Detect if the iframe fails to load (Network Error)
        frame.onerror = function() {
            triggerError();
        };

        // 2. Timeout Detection: If the frame doesn't "talk" to us within 5 seconds, 
        // it usually means the network traffic was blocked/pending.
        const networkCheck = setTimeout(() => {
            try {
                // If the frame is blank or inaccessible due to security block
                if (!frame.contentWindow || frame.contentWindow.length === 0) {
                    triggerError();
                }
            } catch (e) {
                // If we get a security error trying to read the frame, 
                // it means the "Network Traffic" was detected and blocked.
                triggerError();
            }
        }, 5000);

        // Prevent users from trying to escape the overlay with 'Escape' key
        window.addEventListener('keydown', function(e) {
            if (e.key === "Escape") e.preventDefault();
        });
    </script>
</body>
</html>
