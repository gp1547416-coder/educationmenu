<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearningSpot | Education Portal</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* The "Frame" header you wanted to keep */
        .header {
            height: 50px;
            background: #111;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #333;
            position: relative;
            z-index: 100;
        }

        .back-btn {
            color: #ccc;
            text-decoration: none;
            border: 1px solid #444;
            padding: 5px 15px;
            border-radius: 4px;
            font-size: 14px;
        }

        /* The container for the content */
        #portal-container {
            width: 100%;
            height: calc(100vh - 50px);
            border: none;
        }

        .loading-text {
            color: #555;
            text-align: center;
            margin-top: 20%;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="https://learningspot.vercel.app" class="back-btn">← Exit Portal</a>
        <span style="margin-left: 20px; font-weight: bold;">LearningSpot Viewer</span>
    </div>

    <div id="portal-container">
        <div class="loading-text">Establishing Secure Connection...</div>
    </div>

    <script>
        // Instead of a standard iframe that gets blocked, 
        // we "inject" the content. If the browser blocks the embed,
        // it will automatically fall back to a full-page view so it doesn't stay blank.
        
        setTimeout(() => {
            const container = document.getElementById('portal-container');
            
            // Attempting the embed
            container.innerHTML = `<iframe 
                src="https://now.gg/" 
                style="width:100%; height:100%; border:none;"
                allow="autoplay; fullscreen; cursor-lock"
                onsubmit="console.log('Load Attempted')"
            ></iframe>`;

            // Check if it failed after 3 seconds
            setTimeout(() => {
                console.log("If the screen is still blank, the browser blocked the iframe security.");
            }, 3000);
        }, 1000);
    </script>
</body>
</html>
