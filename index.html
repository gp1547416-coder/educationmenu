<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearningSpot | Education Hub</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        .header {
            height: 50px;
            background: #1a1a1a;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #333;
            font-family: sans-serif;
        }
        .back-btn {
            color: #fff;
            text-decoration: none;
            background: #4f46e5;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
        }
        #container { width: 100%; height: calc(100vh - 50px); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header class="header">
        <a href="https://learningspot.vercel.app" class="back-btn">← Back to Hub</a>
    </header>

    <div id="container"></div>

    <script>
        // We use an "About:Blank" trick to create a clean environment
        // that doesn't trigger the same-origin policy as easily.
        const targetUrl = "https://www.easyfun.gg/cloud-games/roblox.html";
        const container = document.getElementById('container');
        
        const ifr = document.createElement('iframe');
        ifr.src = "about:blank";
        ifr.setAttribute("allow", "autoplay; fullscreen; cursor-lock");
        container.appendChild(ifr);

        const frameDoc = ifr.contentWindow.document;
        frameDoc.open();
        // This writes a script into the blank frame that forces the load 
        // from inside a neutral environment.
        frameDoc.write(`
            <style>body,html{margin:0;padding:0;height:100%;overflow:hidden;}</style>
            <iframe src="${targetUrl}" 
                    style="width:100%;height:100%;border:none;" 
                    allowfullscreen>
            </iframe>
        `);
        frameDoc.close();
    </script>
</body>
</html>
