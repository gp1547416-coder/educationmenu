<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearningSpot | Education Menu</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0f172a; font-family: sans-serif; }
        
        .nav-bar {
            height: 50px;
            background: #1e293b;
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: white;
            justify-content: space-between;
        }

        .back-btn {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            border: 1px solid #334155;
            padding: 4px 12px;
            border-radius: 4px;
        }

        .container {
            position: absolute;
            top: 50px;
            bottom: 0;
            left: 0;
            right: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="https://learningspot.vercel.app" class="back-btn">← Home</a>
        <span>Education Portal</span>
        <div style="width: 60px;"></div> </div>

    <div class="container">
        <iframe 
            src="https://now.gg/apps/a/19900/b.html" 
            id="edu-frame"
            allow="autoplay; fullscreen; cursor-lock; clipboard-read; clipboard-write"
            sandbox="allow-forms allow-scripts allow-same-origin allow-popups"
        ></iframe>
    </div>

    <script>
        // Optional: If the site still blocks the proxy, 
        // this script tries to force a reload after 2 seconds.
        const frame = document.getElementById('edu-frame');
        frame.onerror = function() {
            console.log("Frame blocked. Attempting backup load...");
        };
    </script>
</body>
</html>
